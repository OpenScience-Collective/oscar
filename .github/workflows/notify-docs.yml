name: Notify Documentation Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch oscar-updated to documentation repo
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "DOCS_REPO_TOKEN not available to this repo; skipping instant notify."
            echo "The weekly cron in the documentation repo will still sync OSCAR."
            exit 0
          fi
          gh api repos/OpenScience-Collective/documentation/dispatches \
            -f event_type=oscar-updated
          echo "Dispatched oscar-updated; the docs repo will sync and deploy."
